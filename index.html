<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Wawa 🤍</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}
.bg{
position:fixed;
inset:0;
background:url('wawa.jpg.JPG') center/cover;
filter:blur(8px) brightness(.35);
transform:scale(1.1);
z-index:-1;
}
.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
border-radius:25px;
overflow:hidden;
text-align:center;
padding-bottom:20px;
}
.card img{
width:100%;
height:400px;
object-fit:cover;
}
.content{
padding:20px;
}
button{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:15px;
}
.heart{
position:fixed;
font-size:20px;
animation:fall linear forwards;
}
@keyframes fall{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}
</style>
</head>
<body>
<div class="bg"></div>
<audio controls loop>
<source src="lagu.mp3.mp3" type="audio/mpeg">
</audio>
<div class="card">
<img src="wawa.jpg.JPG">
<div class="content">
<h2>Hai Wawa 🤍</h2>
<p>
Aku tahu kamu lagi ngambek sedikit.<br><br>

Tapi daripada marah terus, gimana kalau kita baikan aja?

Aku nggak jago ngerangkai kata-kata, cuma mau bilang kalau aku kangen kamu. Sesederhana itu.

Jadi, boleh nggak aku dapat Wawa yang ceria lagi hari ini? 😊

</p>
<button onclick="alert('Aku kangen Wawa 🤍')">
Klik Aku
</button>
</div>
</div>
<script>
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="🤍";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},300);
</script>
</body>
</html>
